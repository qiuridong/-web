# =========================================
# nginx server block · jb.aijiaxia.cc
# =========================================
# 完整可工作配置 — 含 80 redirect + 443 ssl,不依赖 certbot --nginx 二次改动
# (之前 scp 覆盖会丢 certbot 加的 ssl 块导致 https 路由错乱)
#
# 部署:
#   scp 本文件 -> /etc/nginx/sites-available/jb.aijiaxia.cc
#   ln -sf /etc/nginx/sites-available/jb.aijiaxia.cc /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# 证书续期由 systemd certbot.timer 自动跑(只续 cert,不动配置)
# 首次签证书:
#   certbot --nginx -d jb.aijiaxia.cc --agree-tos -m yunkelai12251@gmail.com -n
#   (跑完 cert 在 /etc/letsencrypt/live/jb.aijiaxia.cc/ 下,本文件已硬编码路径)
# =========================================

# ===== 80 端口:强制 redirect 到 HTTPS =====
# 避免用户访问 http://jb.aijiaxia.cc 时命中 nginx default server(可能是别站)→ "不安全"提示
server {
    listen 80;
    listen [::]:80;
    server_name jb.aijiaxia.cc;
    return 301 https://$host$request_uri;
}

# ===== 443 端口:正式服务 =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jb.aijiaxia.cc;

    # ===== SSL(由 certbot 签发,文件路径稳定)=====
    ssl_certificate     /etc/letsencrypt/live/jb.aijiaxia.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jb.aijiaxia.cc/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ===== 前端静态文件(SPA)=====
    root /opt/signin-panel/frontend/dist;
    index index.html;

    # 长缓存带 hash 的资源
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # index.html 必须每次都问服务器(否则浏览器缓存指向老 js hash,新版上不去)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }

    # ===== API 反代到 docker backend(127.0.0.1:8000)=====
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / 长连接友好
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # ===== /openapi.json / /health / /docs 直通(用于前端类型生成 / 探活 / 文档)=====
    location ~ ^/(openapi\.json|health|docs|redoc)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== SPA fallback(其余路径回到 index.html 让前端路由接管)=====
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 安全 header =====
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # 上传大小限制(备份导入 zip)
    client_max_body_size 50m;

    access_log /var/log/nginx/jb.aijiaxia.cc.access.log;
    error_log  /var/log/nginx/jb.aijiaxia.cc.error.log;
}
