slug: coklw
name: COKLW 每日签到
description: |
  https://coklw.net/ 每日签到。

  使用 cookie 复用已登录态,避开 Cloudflare turnstile challenge。
  典型签到奖励为积分 + 第 N 个签到勇士称号。

  ## 准备工作
  1. 浏览器手动登录 `https://coklw.net/`
  2. 完成登录后,F12 打开开发者工具 → Application(应用)→ Cookies → `https://coklw.net`
  3. 复制 `wordpress_logged_in_*` 那一条(必需);最好把 `wordpress_sec_*` 也一起复制
  4. 粘贴成 `name1=value1; name2=value2` 字符串到下面 Cookie 字段
  5. 注意:WordPress cookie 有效期通常 14 天(若登录时勾"记住我"则 14 天),过期后需重新提供
version: 1.0.0
author: yunkelai
homepage: https://coklw.net/

default_cron: "0 9 * * *"
default_timeout_sec: 3900    # 65 分钟 = 60 分钟最大随机延迟 + 5 分钟实际签到余量;**timeout 必须 ≥ random_delay_sec + 60**
icon: icon.svg

fields:
  - key: cookie
    label: Cookie
    type: secret
    required: true
    description: |
      浏览器登录 coklw.net 后,从 DevTools → Application → Cookies 复制全部
      cookie(或至少包含 `wordpress_logged_in_*` 一条)粘贴成
      `name1=val1; name2=val2` 字符串。
    placeholder: "wordpress_logged_in_xxx=yyy; wordpress_sec_xxx=zzz"

  - key: random_delay_sec
    label: 随机延迟(秒)
    type: integer
    default: 3600
    min: 0
    max: 7200
    description: |
      脚本启动后随机 sleep 0~N 秒再签到,避免每天固定时刻被风控识别。
      默认 3600 = 1 小时;配合 `default_cron: "0 9 * * *"` 即签到时刻
      均匀落在北京时间 9:00–10:00 之间。设为 0 = 立即签到(适合调试)。
      ⚠️ **实例 timeout 必须 ≥ 本字段 + 60 秒**,否则脚本被主程序超时强杀
      (本脚本默认 timeout 3900 已留足 1 小时延迟空间;若你调小 timeout
      请同步调小本字段,否则会被 SIGTERM)。

  - key: user_agent
    label: User-Agent
    type: string
    required: false
    default: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36 Edg/148.0.0.0"
    description: 自定义请求 UA。建议保持与抓包时浏览器一致以降低风控概率。

  - key: skip_if_signed
    label: 已签到时跳过
    type: boolean
    default: true
    description: |
      签到前先调状态接口检查 `customPointSignDaily.signed`,
      若已签到则直接返回 success("今日已签到"),不再调签到接口。
      关闭则强制重复请求一次签到接口(WordPress 端会拒绝并返回提示)。

runtime:
  python_version: ">=3.10"
  isolated: true
  env_passthrough:
    - HTTP_PROXY
    - HTTPS_PROXY
    - NO_PROXY
  dependencies_file: requirements.txt
